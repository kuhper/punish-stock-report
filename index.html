<!DOCTYPE html>
<html lang="zh-TW"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>股市監控中心</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; }
  body { font-family: 'Microsoft JhengHei','Noto Sans TC',system-ui,sans-serif; background: #0f172a; color: #e2e8f0; }
  .nav { display: flex; background: #1e293b; border-bottom: 2px solid #334155; padding: 0 1em; height: 48px; align-items: stretch; position: relative; z-index: 9999; }
  .nav-item { padding: 0 1.5em; cursor: pointer; font-weight: 500; color: #94a3b8; border-bottom: 3px solid transparent; margin-bottom: -2px; transition: all 0.2s; font-size: 0.95em; user-select: none; display: flex; align-items: center; }
  .nav-item:hover { color: #e2e8f0; }
  .nav-item.active { color: #60a5fa; border-bottom-color: #3b82f6; }
  .nav-brand { padding: 0 1em; font-weight: 700; color: #f1f5f9; font-size: 1em; border-right: 1px solid #334155; margin-right: 0.5em; display: flex; align-items: center; }
  .content { position: absolute; top: 48px; left: 0; right: 0; bottom: 0; }
  .content iframe { width: 100%; height: 100%; border: none; background: #f1f5f9; display: block; }
  .tab-panel { width: 100%; height: 100%; display: none; }
  .tab-panel.active { display: block; }
  .placeholder { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; flex-direction: column; color: #64748b; background: #0f172a; }
  .placeholder .icon { font-size: 3em; margin-bottom: 0.5em; }
  .placeholder p { font-size: 1.1em; }
</style>
</head><body>

<div class="nav" id="navbar">

  <div class="nav-item" data-tab="etf">ETF 持股追蹤</div>
  <div class="nav-item" data-tab="sector">族群熱度監控</div>
  <div class="nav-item" data-tab="us">美股昨日強勢股</div>
</div>

<div class="content">
  <div class="tab-panel active" id="panel-punish">
    <iframe src="punish.html"></iframe>
  </div>
  <div class="tab-panel" id="panel-etf">
    <iframe src="etf.html"></iframe>
  </div>
  <div class="tab-panel" id="panel-sector">
    <div class="placeholder">

      <p>族群熱度監控即將上線</p>

    </div>
  </div>
  <div class="tab-panel" id="panel-us">
    <iframe src="us.html"></iframe>
  </div>
</div>
